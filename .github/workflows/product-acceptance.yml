name: Product Acceptance

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  manifest:
    name: Release scope manifest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate acceptance manifest
        run: python scripts/ci/validate_product_acceptance.py

      - name: Compile validator
        run: python -m py_compile scripts/ci/validate_product_acceptance.py

  backend:
    name: Critical Backend scenarios
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Validate acceptance code style
        run: |
          set -o pipefail
          python -m ruff check \
            ../scripts/ci/validate_product_acceptance.py \
            --select E,F,I,UP,B \
            2>&1 | tee product-acceptance-ruff.txt

      - name: Upload Ruff diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: product-acceptance-ruff-diagnostics
          path: backend/product-acceptance-ruff.txt

      - name: Run critical Backend acceptance
        run: |
          set -o pipefail
          python -m pytest -q \
            tests/api/test_user_administration_api.py \
            tests/api/test_recipe_publication_api.py \
            tests/api/test_catalog_import_api.py \
            tests/api/test_project_preparation_status_api.py \
            tests/api/test_audit_api.py \
            tests/api/test_project_audit_api.py \
            tests/api/test_project_document_package_api.py \
            tests/api/test_alcohol_prohibition_api.py \
            tests/migrations/test_h10021_alcohol_prohibition.py \
            2>&1 | tee product-acceptance-backend.txt

      - name: Upload Backend diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: product-acceptance-backend-diagnostics
          path: backend/product-acceptance-backend.txt

  browser:
    name: Critical Chrome scenarios
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        run: npm ci --no-audit --no-fund

      - name: Build frontend
        run: npm run build

      - name: Run access acceptance
        run: node --import ./browser-tests/retry-chrome-profile-cleanup.mjs browser-tests/run-access-auth.mjs

      - name: Run user administration acceptance
        run: node --import ./browser-tests/retry-chrome-profile-cleanup.mjs browser-tests/run-account-admin.mjs

      - name: Run Recipe moderation acceptance
        run: node --import ./browser-tests/retry-chrome-profile-cleanup.mjs browser-tests/run-recipe-moderation.mjs

      - name: Run published Recipe Dish acceptance
        run: node --import ./browser-tests/retry-chrome-profile-cleanup.mjs browser-tests/run-published-recipe-dish-sync.mjs

      - name: Run audit acceptance
        run: node --import ./browser-tests/retry-chrome-profile-cleanup.mjs browser-tests/run-audit-log.mjs

      - name: Run consolidated documents acceptance
        run: node --import ./browser-tests/retry-chrome-profile-cleanup.mjs browser-tests/run-consolidated-documents.mjs

      - name: Run guided release acceptance
        run: node --import ./browser-tests/retry-chrome-profile-cleanup.mjs browser-tests/run-guided-release.mjs

      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: product-acceptance-browser-evidence
          path: frontend/browser-test-artifacts/
          if-no-files-found: ignore
