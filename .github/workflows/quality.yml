name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Ruff critical baseline
        run: python -m ruff check app tests --select E9,F63,F7,F82

      - name: Mypy typed workflow baseline
        run: |
          python -m mypy \
            app/services/meal_plan_shopping_service.py \
            app/services/meal_plan_purchasing_refresh_service.py \
            app/services/project_participant_recalculation_service.py \
            app/modules/api/meal_slot_router.py

      - name: Backend tests
        run: python -m pytest -q

      - name: Validate Alembic single head
        run: |
          head_count="$(python -m alembic heads | grep -c ' (head)$')"
          test "$head_count" -eq 1

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        run: npm ci --no-audit --no-fund

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Production build
        run: npm run build
