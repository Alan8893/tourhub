name: Generate Frontend Lockfile

on:
  push:
    branches:
      - quality/deterministic-dependencies
    paths:
      - frontend/package.json
      - .github/workflows/generate-frontend-lockfile.yml

permissions:
  contents: write

jobs:
  lockfile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: quality/deterministic-dependencies

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - name: Generate public-registry lockfile
        working-directory: frontend
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund --registry=https://registry.npmjs.org

      - name: Commit lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/package-lock.json
          git diff --cached --quiet && exit 0
          git commit -m "chore(frontend): restore dependency lockfile"
          git push origin HEAD:quality/deterministic-dependencies
