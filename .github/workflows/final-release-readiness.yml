name: Final Release Readiness

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  actions: read
  contents: write

concurrency:
  group: final-release-readiness-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    name: Release contract and deployment checklist
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install release validation tools
        run: python -m pip install --upgrade pip && python -m pip install ruff==0.12.7

      - name: Compile release validators
        run: |
          python -m py_compile scripts/release/validate_release_readiness.py
          python -m py_compile scripts/release/verify_final_migration_cycle.py
          python -m py_compile scripts/release/finalize_release.py

      - name: Ruff release validators
        run: |
          python -m ruff check \
            scripts/release/validate_release_readiness.py \
            scripts/release/verify_final_migration_cycle.py \
            scripts/release/finalize_release.py \
            --select E,F,I,UP,B

      - name: Validate release readiness manifest
        run: python scripts/release/validate_release_readiness.py

      - name: Validate release Compose syntax
        run: docker compose -f docker-compose.release.yml config >/tmp/tourhub-release-compose.yml

  migration-cycle:
    name: PostgreSQL 18 final migration cycle
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: tourhub
          POSTGRES_PASSWORD: tourhub
          POSTGRES_DB: tourhub_release_cycle
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tourhub -d tourhub_release_cycle"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE__URL: postgresql+psycopg://tourhub:tourhub@127.0.0.1:5432/tourhub_release_cycle
      FINAL_MIGRATION_EVIDENCE_PATH: ${{ github.workspace }}/final-migration-evidence.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend
        working-directory: backend
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Run previous-head-previous-head cycle
        working-directory: backend
        run: python ../scripts/release/verify_final_migration_cycle.py

      - name: Upload final migration evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-migration-evidence
          path: final-migration-evidence.json
          if-no-files-found: error

  tag-release:
    name: Verify exact-head workflows and create release tag
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - contract
      - migration-cycle
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout exact merged head
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate release-ready state
        run: python scripts/release/validate_release_readiness.py

      - name: Wait for exact-head workflows and create tag
        run: |
          python scripts/release/finalize_release.py \
            --sha "$GITHUB_SHA" \
            --tag v0.1.0 \
            --poll-seconds 20 \
            --max-attempts 150

      - name: Upload final tag evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-release-tag-evidence
          path: final-release-tag-evidence.json
          if-no-files-found: error
