name: Document Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  document-backend:
    name: Document backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Ruff document workflow
        run: |
          set -o pipefail
          python -m ruff check \
            app/engines/documents/branding.py \
            app/engines/documents/branding_render.py \
            app/engines/documents/consolidated_dto.py \
            app/engines/documents/consolidated_excel.py \
            app/engines/documents/consolidated_pdf.py \
            app/engines/documents/equipment_dto.py \
            app/engines/documents/equipment_excel.py \
            app/engines/documents/equipment_pdf.py \
            app/engines/documents/excel.py \
            app/engines/documents/pdf.py \
            app/engines/documents/printer.py \
            app/models/club_settings.py \
            app/modules/api/club_settings_router.py \
            app/modules/projects/router.py \
            app/schemas/club_settings.py \
            app/services/club_settings_service.py \
            app/services/consolidated_document_mapper.py \
            app/services/document_mapper.py \
            app/services/equipment_document_mapper.py \
            app/services/project_document_package_service.py \
            app/services/project_document_service.py \
            --select E,F,I,UP,B --ignore B008 2>&1 | tee document-ruff.txt

      - name: Upload Ruff diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: document-ruff-diagnostics
          path: backend/document-ruff.txt

      - name: Strict mypy document workflow
        run: |
          set -o pipefail
          python -m mypy \
            app/engines/documents/branding.py \
            app/engines/documents/consolidated_dto.py \
            app/engines/documents/consolidated_excel.py \
            app/engines/documents/consolidated_pdf.py \
            app/models/club_settings.py \
            app/schemas/club_settings.py \
            app/services/club_settings_service.py \
            app/services/consolidated_document_mapper.py \
            app/engines/documents/equipment_dto.py \
            app/services/equipment_document_mapper.py \
            app/services/project_document_service.py 2>&1 | tee document-mypy.txt

      - name: Upload mypy diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: document-mypy-diagnostics
          path: backend/document-mypy.txt

      - name: Document export tests
        run: |
          set -o pipefail
          python -m pytest -q \
            tests/services/test_consolidated_project_documents.py \
            tests/services/test_equipment_document_export.py \
            tests/services/test_club_branding_documents.py \
            tests/api/test_club_settings_api.py \
            tests/api/test_project_equipment_documents.py \
            tests/api/test_project_document_package_api.py 2>&1 | tee document-pytest.txt

      - name: Upload pytest diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: document-pytest-diagnostics
          path: backend/document-pytest.txt
