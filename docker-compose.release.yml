services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: tourhub
      POSTGRES_PASSWORD: ${TOURHUB_DB_PASSWORD:-tourhub}
      POSTGRES_DB: tourhub
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    volumes:
      - postgres18_cluster_data:/var/lib/postgresql

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 3s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE__URL: postgresql+psycopg://tourhub:${TOURHUB_DB_PASSWORD:-tourhub}@postgres:5432/tourhub
      REDIS__URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${TOURHUB_BACKEND_PORT:-8000}:8000"
    healthcheck:
      test:
        - CMD
        - curl
        - --fail
        - --silent
        - --show-error
        - http://127.0.0.1:8000/api/v1/health
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.release
      args:
        VITE_API_URL: /api/v1
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${TOURHUB_FRONTEND_PORT:-5173}:5173"
    healthcheck:
      test:
        - CMD
        - wget
        - -q
        - -O
        - /dev/null
        - http://127.0.0.1:5173/healthz
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  postgres18_cluster_data:
